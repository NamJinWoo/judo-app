<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신청 완료 - 청림유도관</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a2e; min-height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-sm-8 col-md-5 col-lg-4">
            <div class="card p-4 text-center">
                <i class="bi bi-hourglass-split text-warning mb-3" style="font-size: 3rem;"></i>
                <h5 class="fw-semibold">신청이 완료되었습니다</h5>
                <p class="text-muted">
                    <strong>{{ name }}</strong>님의 가입 신청을 받았습니다.<br>
                    관리자 승인 후 로그인할 수 있습니다.
                </p>
                <a href="{% url 'accounts:login' %}" class="btn btn-outline-warning mt-2">로그인 페이지로</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
