<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 청림유도관</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a2e; min-height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-sm-8 col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <i class="bi bi-award-fill text-warning" style="font-size: 3rem;"></i>
                <h4 class="text-white mt-2 fw-bold">청림유도관</h4>
            </div>
            <div class="card p-4">
                <h5 class="mb-1 fw-semibold">회원가입 신청</h5>
                <p class="text-muted small mb-4">관리자 승인 후 로그인할 수 있습니다.</p>
                {% if form.non_field_errors %}
                <div class="alert alert-danger py-2 small">{{ form.non_field_errors }}</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-medium">이름</label>
                        <input type="text" name="name" class="form-control {% if form.name.errors %}is-invalid{% endif %}"
                               value="{{ form.name.value|default:'' }}" autofocus required>
                        {% if form.name.errors %}
                        <div class="invalid-feedback">{{ form.name.errors|join:", " }}</div>
                        {% endif %}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">띠/단</label>
                        <select name="belt" class="form-select">
                            {% for value, label in form.fields.belt.choices %}
                            <option value="{{ value }}" {% if form.belt.value == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">비밀번호</label>
                        <input type="password" name="password1" class="form-control {% if form.password1.errors %}is-invalid{% endif %}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium">비밀번호 확인</label>
                        <input type="password" name="password2" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-semibold">신청하기</button>
                </form>
                <hr class="my-3">
                <p class="text-center text-muted small mb-0">
                    이미 계정이 있으신가요?
                    <a href="{% url 'accounts:login' %}" class="text-decoration-none">로그인</a>
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
