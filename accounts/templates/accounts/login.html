<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 청림유도관</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="청림유도관">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #1a1a2e; min-height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-sm-8 col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <img src="/icon-192.png" style="width:3rem;height:3rem;border-radius:10px;object-fit:cover;" alt="청림유도관">
                <h4 class="text-white mt-2 fw-bold">청림유도관</h4>
            </div>
            <div class="card p-4">
                <h5 class="mb-4 fw-semibold">로그인</h5>
                {% if error %}
                <div class="alert alert-danger py-2 small">{{ error }}</div>
                {% endif %}
                <form method="post" id="login-form">
                    {% csrf_token %}
                    <input type="hidden" name="standalone" value="0">
                    <div class="mb-3">
                        <label class="form-label fw-medium">이름</label>
                        <input type="text" name="name" class="form-control" placeholder="등록된 이름" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium">비밀번호</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-semibold">로그인</button>
                </form>
                <hr class="my-3">
                <p class="text-center text-muted small mb-0">
                    계정이 없으신가요?
                    <a href="{% url 'accounts:register' %}" class="text-decoration-none">회원가입 신청</a>
                </p>
            </div>
        </div>
    </div>
</div>
<script>
if (window.navigator.standalone) {
    document.querySelector('input[name="standalone"]').value = '1';
}
</script>
</body>
</html>
